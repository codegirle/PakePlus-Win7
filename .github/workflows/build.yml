name: Electron Release

on:
    workflow_dispatch:
        inputs:
            build_macos_aarch64:
                description: 'Build for macOS aarch64 (Apple Silicon)'
                required: false
                type: boolean
                default: false
            build_macos_x86_64:
                description: 'Build for macOS x86_64 (Intel)'
                required: false
                type: boolean
                default: false
            build_linux_x86_64:
                description: 'Build for Linux x86_64'
                required: false
                type: boolean
                default: false
            build_linux_aarch64:
                description: 'Build for Linux aarch64'
                required: false
                type: boolean
                default: false
            build_windows_x86_64:
                description: 'Build for Windows x86_64'
                required: false
                type: boolean
                default: false
            build_windows_aarch64:
                description: 'Build for Windows aarch64'
                required: false
                type: boolean
                default: false
    push:
        tags:
            - 'v*'

jobs:
    publish-electron:
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS 平台配置
                    - platform: 'macos-latest'
                      arch: 'arm64'
                      build_args: '--arm64'
                      electron_target: '--mac'
                      artifact_name: 'macos-aarch64'
                      enabled: ${{ github.event.inputs.build_macos_aarch64 == 'true' }}
                    - platform: 'macos-latest'
                      arch: 'x64'
                      build_args: '--x64'
                      electron_target: '--mac'
                      artifact_name: 'macos-x86_64'
                      enabled: ${{ github.event.inputs.build_macos_x86_64 == 'true' }}

                    # Linux 平台配置
                    - platform: 'ubuntu-22.04'
                      arch: 'x64'
                      build_args: '--x64'
                      electron_target: '--linux'
                      artifact_name: 'linux-x86_64'
                      enabled: ${{ github.event.inputs.build_linux_x86_64 == 'true' }}
                    - platform: 'ubuntu-22.04'
                      arch: 'arm64'
                      build_args: '--arm64'
                      electron_target: '--linux'
                      artifact_name: 'linux-aarch64'
                      enabled: ${{ github.event.inputs.build_linux_aarch64 == 'true' }}

                    # Windows 平台配置
                    - platform: 'windows-latest'
                      arch: 'x64'
                      build_args: '--x64'
                      electron_target: '--win'
                      artifact_name: 'windows-x86_64'
                      enabled: ${{ github.event.inputs.build_windows_x86_64 == 'true' }}
                    - platform: 'windows-latest'
                      arch: 'arm64'
                      build_args: '--arm64'
                      electron_target: '--win'
                      artifact_name: 'windows-aarch64'
                      enabled: ${{ github.event.inputs.build_windows_aarch64 == 'true' }}

        runs-on: ${{ matrix.platform }}
        timeout-minutes: 60

        steps:
            - name: Checkout Repository
              if: ${{ matrix.enabled }}
              uses: actions/checkout@v4

            - name: Setup Node.js
              if: ${{ matrix.enabled }}
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              if: ${{ matrix.enabled }}
              run: npm ci

            - name: Install Linux build dependencies
              if: ${{ matrix.enabled && matrix.platform == 'ubuntu-22.04'}}
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libnss3-dev libasound2-dev libxss-dev libxtst-dev libnotify-dev libgconf-2-4 libgbm-dev

            - name: Regenerate Icons
              if: ${{ matrix.enabled }}
              run: npm run icon

            - name: Init Project Config
              if: ${{ matrix.enabled }}
              run: node ./scripts/ppworker.cjs

            - name: Build Electron app
              if: ${{ matrix.enabled }}
              run: npx electron-builder ${{ matrix.electron_target }} ${{ matrix.build_args }} --publish never

            - name: Rename files
              if: ${{ matrix.enabled }}
              shell: bash
              run: |
                  PREFIX="${{ github.ref_name }}"
                  echo "Prefix: $PREFIX"

                  for file in dist/*.{exe,dmg,AppImage,deb,rpm,zip,tar.gz}; do
                    [ -e "$file" ] || continue
                    dir=$(dirname "$file")
                    base=$(basename "$file")
                    new_file="$dir/$PREFIX-$base"

                    mv "$file" "$new_file"
                    echo "Rename: $file -> $new_file"
                  done

            - name: Upload artifacts
              if: ${{ matrix.enabled }}
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.NAME }}-${{ matrix.artifact_name }}
                  path: |
                      dist/*.exe
                      dist/*.dmg
                      dist/*.AppImage
                      dist/*.deb
                      dist/*.rpm
                      dist/*.zip
                      dist/*.tar.gz
                      !dist/*.yml
                      !dist/*.json

            - name: Create GitHub Release
              if: ${{ matrix.enabled }}
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ env.NAME }} v${{ env.VERSION }}
                  body: ${{ env.PUBBODY }}
                  draft: false
                  prerelease: false
                  files: |
                      dist/*.exe
                      dist/*.dmg
                      dist/*.AppImage
                      dist/*.deb
                      dist/*.rpm
                      dist/*.zip
                      dist/*.tar.gz
