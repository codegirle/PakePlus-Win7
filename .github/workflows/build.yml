name: Build Windows

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Version (e.g.: 1.0.0)'
                required: false
                default: ''

permissions:
    contents: write

jobs:
    build-windows:
        runs-on: windows-latest

        strategy:
            matrix:
                arch: [ia32, x64]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Get version
              id: version
              run: |
                  if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.version }}" -ne "") {
                    echo "version=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
                  } else {
                    $packageJson = Get-Content package.json | ConvertFrom-Json
                    echo "version=$($packageJson.version)" >> $env:GITHUB_OUTPUT
                  }
              shell: pwsh

            - name: Build Windows (${{ matrix.arch }})
              run: npm run build:win -- --${{ matrix.arch }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: List build artifacts
              run: dir dist /B
              shell: cmd

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows-${{ matrix.arch }}
                  path: dist/*.exe
                  retention-days: 30

    release:
        needs: build-windows
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get version
              id: version
              run: |
                  if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
                    echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
                  else
                    VERSION=$(node -p "require('./package.json').version")
                    echo "version=$VERSION" >> $GITHUB_OUTPUT
                  fi

            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  pattern: windows-*
                  merge-multiple: true

            - name: List downloaded file structure
              run: |
                  echo "=== File structure ==="
                  find artifacts -type f -name "*.exe" | sort
                  echo "=== File details ==="
                  ls -la artifacts/
                  if [ -d "artifacts/windows-ia32" ]; then
                    echo "=== windows-ia32 directory ==="
                    ls -la artifacts/windows-ia32/
                  fi
                  if [ -d "artifacts/windows-x64" ]; then
                    echo "=== windows-x64 directory ==="
                    ls -la artifacts/windows-x64/
                  fi

            - name: Rename files (fix version number)
              run: |
                  # Find all .exe files and rename the wrong version number
                  for file in artifacts/*.exe; do
                    if [ -f "$file" ]; then
                      # Replace 1.0.0 with the correct version number
                      new_file=$(echo "$file" | sed "s/1\.0\.0/${{ steps.version.outputs.version }}/g")
                      if [ "$file" != "$new_file" ]; then
                        mv "$file" "$new_file"
                        echo "Rename: $file -> $new_file"
                      fi
                    fi
                  done

                  # Process files in subdirectories
                  find artifacts -name "*.exe" -type f | while read file; do
                    # Replace 1.0.0 with the correct version number
                    new_file=$(echo "$file" | sed "s/1\.0\.0/${{ steps.version.outputs.version }}/g")
                    if [ "$file" != "$new_file" ]; then
                      mv "$file" "$new_file"
                      echo "Rename: $file -> $new_file"
                    fi
                  done

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release v${{ steps.version.outputs.version }}
                  body: |
                      ## Windows 版本发布 v${{ steps.version.outputs.version }}

                      自动构建的 Windows 版本，包含 32位 和 64位 架构。

                      ### File description
                      - `*setup.exe`: 安装程序版本
                      - `*.exe` (非setup): 便携版本

                      ### 系统要求
                      - Windows 7 或更高版本
                      - 请根据您的系统架构选择对应的版本
                  files: |
                      artifacts/**/*.exe
                  draft: false
                  prerelease: false
