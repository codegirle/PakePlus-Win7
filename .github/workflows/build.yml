name: Electron Release

on:
    workflow_dispatch:
        inputs:
            build_macos_aarch64:
                description: 'Build for macOS aarch64 (Apple Silicon)'
                required: false
                type: boolean
                default: false
            build_macos_x86_64:
                description: 'Build for macOS x86_64 (Intel)'
                required: false
                type: boolean
                default: false
            build_linux_x86_64:
                description: 'Build for Linux x86_64'
                required: false
                type: boolean
                default: false
            build_linux_aarch64:
                description: 'Build for Linux aarch64'
                required: false
                type: boolean
                default: false
            build_windows_x86_64:
                description: 'Build for Windows x86_64'
                required: false
                type: boolean
                default: false
            build_windows_aarch64:
                description: 'Build for Windows aarch64'
                required: false
                type: boolean
                default: false
    push:
        tags:
            - 'v*'

jobs:
    publish-electron:
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS 平台配置
                    - platform: 'macos-latest'
                      arch: 'arm64'
                      build_args: '--arm64'
                      electron_target: '--mac'
                      artifact_name: 'macos-aarch64'
                      enabled: ${{ github.event.inputs.build_macos_aarch64 == 'true' }}
                    - platform: 'macos-latest'
                      arch: 'x64'
                      build_args: '--x64'
                      electron_target: '--mac'
                      artifact_name: 'macos-x86_64'
                      enabled: ${{ github.event.inputs.build_macos_x86_64 == 'true' }}

                    # Linux 平台配置
                    - platform: 'ubuntu-22.04'
                      arch: 'x64'
                      build_args: '--x64'
                      electron_target: '--linux'
                      artifact_name: 'linux-x86_64'
                      enabled: ${{ github.event.inputs.build_linux_x86_64 == 'true' }}
                    - platform: 'ubuntu-22.04'
                      arch: 'arm64'
                      build_args: '--arm64'
                      electron_target: '--linux'
                      artifact_name: 'linux-aarch64'
                      enabled: ${{ github.event.inputs.build_linux_aarch64 == 'true' }}

                    # Windows 平台配置
                    - platform: 'windows-latest'
                      arch: 'x64'
                      build_args: '--x64'
                      electron_target: '--win'
                      artifact_name: 'windows-x86_64'
                      enabled: ${{ github.event.inputs.build_windows_x86_64 == 'true' }}
                    - platform: 'windows-latest'
                      arch: 'arm64'
                      build_args: '--arm64'
                      electron_target: '--win'
                      artifact_name: 'windows-aarch64'
                      enabled: ${{ github.event.inputs.build_windows_aarch64 == 'true' }}

        runs-on: ${{ matrix.platform }}
        timeout-minutes: 60

        steps:
            - name: Checkout Repository
              if: ${{ matrix.enabled }}
              uses: actions/checkout@v4

            - name: Setup Node.js
              if: ${{ matrix.enabled }}
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              if: ${{ matrix.enabled }}
              run: npm ci

            # Linux 平台依赖安装
            - name: Install Linux build dependencies
              if: ${{ matrix.enabled && matrix.platform == 'ubuntu-22.04'}}
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libnss3-dev libasound2-dev libxss-dev libxtst-dev libnotify-dev libgconf-2-4 libgbm-dev

            # 初始化项目配置（和原 Tauri 逻辑保持一致）
            - name: Init Project Config
              if: ${{ matrix.enabled }}
              run: node ./scripts/ppworker.cjs

            # Electron 打包核心步骤（根据 matrix 动态：平台 + 架构）
            - name: Build Electron app
              if: ${{ matrix.enabled }}
              run: npx electron-builder ${{ matrix.electron_target }} ${{ matrix.build_args }}

            # 获取版本信息（用于发布）
            - name: Extract version info
              if: ${{ matrix.enabled }}
              id: version_info
              run: |
                  # 从 package.json 读取版本号
                  VERSION=$(node -p "require('./package.json').version")
                  NAME=$(node -p "require('./package.json').name")
                  echo "VERSION=$VERSION" >> $GITHUB_ENV
                  echo "NAME=$NAME" >> $GITHUB_ENV
                  # 默认发布描述
                  echo "PUBBODY=Release v$VERSION" >> $GITHUB_ENV
              shell: bash

            # 上传打包产物
            - name: Upload artifacts
              if: ${{ matrix.enabled }}
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.NAME }}-${{ matrix.artifact_name }}
                  path: |
                      dist/*.exe
                      dist/*.dmg
                      dist/*.AppImage
                      dist/*.deb
                      dist/*.rpm
                      dist/*.zip
                      dist/*.tar.gz
                      !dist/*.yml
                      !dist/*.json

            # 创建 GitHub Release 并上传产物
            - name: Create GitHub Release
              if: ${{ matrix.enabled }}
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: v${{ env.VERSION }}
                  name: ${{ env.NAME }} v${{ env.VERSION }}
                  body: ${{ env.PUBBODY }}
                  draft: false
                  prerelease: false
                  files: |
                      dist/*.exe
                      dist/*.dmg
                      dist/*.AppImage
                      dist/*.deb
                      dist/*.rpm
                      dist/*.zip
                      dist/*.tar.gz
